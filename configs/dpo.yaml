# Direct Preference Optimization (RM-free alternative to PPO)
seed: 42
output_dir: checkpoints/dpo
device: auto

model:
  name_or_path: checkpoints/sft   # policy init (reference is a frozen copy)
  dtype: auto
  use_lora: false
  lora: { r: 16, alpha: 32, dropout: 0.05, target_modules: null }

data:
  name: Anthropic/hh-rlhf
  train_split: train
  eval_split: test
  max_samples: null
  max_eval_samples: 1000
  max_length: 512

dpo:
  beta: 0.1                  # KL strength (implicit reward temperature)
  loss_type: sigmoid         # sigmoid (DPO) | ipo | hinge
  label_smoothing: 0.0
  length_normalize: false    # average logps over response tokens (curbs length bias)

train:
  epochs: 1
  batch_size: 8
  grad_accum: 1
  lr: 5.0e-6
  weight_decay: 0.0
  warmup_ratio: 0.03
  max_grad_norm: 1.0
  bf16: true
  gradient_checkpointing: false   # trade compute for memory on large models
  log_every: 10
  eval_every: 200
  save_every: 500
