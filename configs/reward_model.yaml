# Reward model training (Bradley-Terry preference loss)
seed: 42
output_dir: checkpoints/reward_model
device: auto                 # auto|cpu|cuda|mps

model:
  name_or_path: gpt2
  dtype: auto                # auto|float32|bfloat16|float16
  use_lora: false
  lora: { r: 16, alpha: 32, dropout: 0.05, target_modules: null }

data:
  name: Anthropic/hh-rlhf    # preference dataset; also supports UltraFeedback (cleaner):
                             #   -o data.name=HuggingFaceH4/ultrafeedback_binarized -o data.train_split=train_prefs -o data.eval_split=test_prefs
  train_split: train
  eval_split: test
  max_samples: null          # cap train examples (null = all)
  max_eval_samples: 1000
  max_length: 512
  max_pair_similarity: 0.5   # drop low-contrast pairs (train set only). Rare on HH with jaccard.
  contrast_metric: jaccard   # "jaccard" (cheap; ~no-op on HH) | "embedding" (MiniLM cosine, semantic).
                             #   embedding on HH: start ~0.7 and TUNE — the drop fraction is subset-dependent
                             #   (cosine<=0.6 removed ~37% of the HH test split); too-low a threshold starves the RM.
  embedding_model: sentence-transformers/all-MiniLM-L6-v2

train:
  epochs: 1                  # try 2 — multi-epoch RMs can help (arXiv:2506.01937); costs ~2x time
  batch_size: 8
  grad_accum: 1              # keep ~baseline step count; big-batch recipes need big data, not ~20k samples
  lr: 1.0e-5                 # the value that converges on this budget; don't slash it
  weight_decay: 0.0
  warmup_ratio: 0.03
  max_grad_norm: 1.0
  bf16: true
  gradient_checkpointing: false   # trade compute for memory on large models
  margin: 0.0                # Bradley-Terry margin (Llama-2 style; helps on separable pairs)
  label_smoothing: 0.1       # soft labels — robust to HH-RLHF's ~25% noisy pairs
  log_every: 10
  eval_every: 200
  save_every: 500
